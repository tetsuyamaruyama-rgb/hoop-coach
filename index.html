<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>バスケコーチ Kids</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff7a18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="バスケコーチ" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🏀 バスケコーチ <span>Kids</span></h1>
      <p class="sub">どうがを えらぶと、AIコーチが アドバイスするよ！</p>
    </header>

    <!-- HOME: choose a mode -->
    <section id="screen-home" class="screen active">
      <button class="mode-btn shoot" data-mode="shoot">
        <span class="emoji">🎯</span>
        <span class="t">シュート</span>
        <small>フォームを みてもらう</small>
      </button>
      <button class="mode-btn dribble" data-mode="dribble">
        <span class="emoji">⛹️</span>
        <span class="t">ドリブル</span>
        <small>しせい・リズムを みてもらう</small>
      </button>
      <button class="mode-btn defense" data-mode="defense">
        <span class="emoji">🛡️</span>
        <span class="t">ディフェンス</span>
        <small>かまえを みてもらう</small>
      </button>
      <input id="videoInput" type="file" accept="video/*" hidden />
      <button class="link-btn" id="historyBtn">📒 れんしゅうの きろくを みる</button>
    </section>

    <!-- LOADING -->
    <section id="screen-loading" class="screen">
      <div class="spinner"></div>
      <p id="loadingMsg">AIコーチが みているよ…</p>
      <div class="progress"><div id="progressBar"></div></div>
    </section>

    <!-- RESULT -->
    <section id="screen-result" class="screen">
      <div class="mode-tag" id="modeTag"></div>
      <div class="score" id="scoreStars">⭐</div>
      <div class="video-wrap">
        <video id="resultVideo" playsinline muted webkit-playsinline></video>
        <canvas id="overlayCanvas"></canvas>
      </div>
      <button class="link-btn" id="replayBtn">▶ もういちど さいせい</button>
      <div id="feedback"></div>
      <div class="metrics" id="metrics"></div>
      <p class="saved-note" id="savedNote">📒 きろくに ほぞんしたよ！</p>
      <button class="big-btn secondary" id="againBtn">🔁 もういちど</button>
    </section>

    <!-- HISTORY -->
    <section id="screen-history" class="screen">
      <h2 class="h2">📒 れんしゅうの きろく</h2>
      <div class="card">
        <div class="card-ttl">この1しゅうかん（れんしゅうした かいすう）</div>
        <canvas id="weekCanvas" height="160"></canvas>
      </div>
      <div class="stats" id="histStats"></div>
      <div id="histList"></div>
      <button class="big-btn secondary" id="histBackBtn">⬅️ もどる</button>
      <button class="link-btn danger" id="clearBtn">🗑️ きろくを ぜんぶ けす</button>
    </section>

    <!-- ERROR -->
    <section id="screen-error" class="screen">
      <div class="emoji big">😅</div>
      <p id="errorMsg"></p>
      <button class="big-btn secondary" id="errorBackBtn">⬅️ もどる</button>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.20.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.20.0/dist/tf-converter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.20.0/dist/tf-backend-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
